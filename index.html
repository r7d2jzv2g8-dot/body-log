<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Karla:wght@400;500;600&family=Caveat:wght@600;700&family=Space+Mono:wght@500;700&display=swap');
  :root {

  .bct-tracker { display: flex; gap: 10px; }
  .bct-tracker-icon { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; flex-shrink: 0; font-size: 16px; }
  .bct-swatch-clay { background: var(--clay); }
  .bct-swatch-moss { background: var(--moss); }
  .bct-swatch-dustyblue { background: var(--dustyblue); }
  .bct-swatch-gold { background: var(--gold); }
  .bct-swatch-rose { background: var(--rose); }
  .bct-tracker-body { flex: 1; min-width: 0; }

  .bct-chip.subtle { color: var(--ink-soft); }
  .bct-inline-input { width: 100%; font-family: 'Karla', sans-serif; font-size: 16px; border: 1px solid var(--line); border-radius: 8px; padding: 7px 8px; background: var(--paper); color: var(--ink); }

  .bct-squiggle { height: 12px; opacity: .6; }

  .bct-squiggle path { fill: none; stroke: var(--line); stroke-width: 2; stroke-linecap: round; }

  .bct-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 720px) { .bct-grid-2 { grid-template-columns: 1fr; } }
  .bct-chart-wrap { position: relative; height: 200px; }
  .bct-empty-chart { height: 180px; display: flex; align-items: center; justify-content: center; color: var(--ink-soft); font-size: 13px; border: 1px dashed var(--line); border-radius: 10px; }
  .bct-select { font-size: 12.5px; border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px; background: var(--paper); color: var(--ink); }

  .bct-table-wrap { overflow-x: auto; }

  .bct-table th { text-align: left; font-size: 10.5px; text-transform: uppercase; letter-spacing: .04em; color: var(--ink-soft); padding: 6px 8px; border-bottom: 1px solid var(--line); white-space: nowrap; }

  @media (min-width: 640px) { .bct-modal { border-radius: 16px; } }

  .bct-field input, .bct-field textarea, .bct-field select { font-family: 'Karla', sans-serif; font-size: 16px; color: var(--ink); border: 1px solid var(--line); border-radius: 9px; padding: 9px 10px; background: var(--card); width: 100%; }
  .bct-input-with-toggle { display: flex; gap: 6px; }
  .bct-input-with-toggle input { flex: 1; }
  .bct-input-with-toggle select { width: 68px; }
  .bct-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 10px; }
  .bct-section { margin-top: 6px; padding-top: 14px; border-top: 1px dashed var(--line); }
  .bct-section-title { font-family: 'Caveat', cursive; font-size: 16px; color: var(--clay); margin: 0 0 8px; }
  .bct-add-site { display: flex; gap: 6px; margin-top: 4px; }
  .bct-add-site input { flex: 1; font-size: 14px; border: 1px solid var(--line); border-radius: 8px; padding: 7px 9px; background: var(--card); }
  .bct-tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .bct-tag { display: inline-flex; align-items: center; gap: 5px; background: var(--card); border: 1px solid var(--line); border-radius: 999px; padding: 4px 8px 4px 10px; font-size: 12.5px; }
  .bct-tag button { background: none; border: none; cursor: pointer; color: var(--ink-soft); padding: 0; font-size: 13px; }

  .bct-backup-steps { margin: 0; padding-left: 20px; font-size: 12.5px; color: var(--ink); display: flex; flex-direction: column; gap: 4px; }
  .bct-backup-steps li { padding-left: 2px; }
  .bct-backup-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 4px; }
  .bct-btn-secondary.small { padding: 5px 10px; font-size: 12px; white-space: nowrap; }
  .bct-toggle-group { display: flex; gap: 6px; }
  .bct-calc { margin-top: 12px; display: flex; flex-direction: column; gap: 10px; }
  .bct-calc-result { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; display: flex; flex-direction: column; gap: 6px; }
  .bct-calc-row { display: flex; justify-content: space-between; font-size: 13px; }
  .bct-calc-row strong { font-family: 'Space Mono', monospace; }
  .bct-calc-warning { color: var(--clay); font-size: 12px; margin: 0; }
  .bct-install-note { display: flex; gap: 10px; align-items: flex-start; background: rgba(201,154,62,.12); border: 1px solid rgba(201,154,62,.4); border-radius: 12px; padding: 12px 14px; font-size: 13px; }
</style>

<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

const todayISO = () => new Date().toISOString().slice(0, 10);
const clamp = (n, lo, hi) => Math.max(lo, Math.min(hi, n));
const diffDays = (a, b) => Math.round((new Date(a) - new Date(b)) / 86400000);
const fmtDate = (d) => new Date(d + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" });
const fmtDateFull = (d) => new Date(d + "T00:00:00").toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" });

const COLORS = { clay: "#C1602E", moss: "#5B7052", dustyblue: "#5C7A8A", gold: "#C99A3E", rose: "#B97F82", line: "#DCCFAF" };

const DEFAULT_TAPE_SITES = ["Waist", "Hips", "Chest", "Neck", "Right Arm", "Right Thigh"];
const DEFAULT_CALIPER_SITES = ["Abdomen", "Suprailiac", "Thigh", "Triceps"];
const RANGE_OPTIONS = [
  { key: "2w", label: "2W", days: 14 },
  { key: "1m", label: "1M", days: 30 },
  { key: "3m", label: "3M", days: 90 },
  { key: "6m", label: "6M", days: 180 },
  { key: "all", label: "All", days: null },
];

function filterByRange(list, rangeKey) {
  const opt = RANGE_OPTIONS.find((o) => o.key === rangeKey);
  if (!opt || opt.days == null) return list;
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - opt.days);
  const cutoffISO = cutoff.toISOString().slice(0, 10);
  return list.filter((e) => e.date >= cutoffISO);
}

const LOG_PAGE_SIZE = 10;
const ACTIVITY_MULTIPLIERS = { sedentary: 1.2, light: 1.375, moderate: 1.55, active: 1.725, veryActive: 1.9 };

function computeMacros({ sex, age, heightIn, weightLb, activityLevel, goalWeightLb, goalDate, pace }) {
  const weightKg = weightLb * 0.45359237;
  const heightCm = heightIn * 2.54;
  const bmr = sex === "male"
    ? 10 * weightKg + 6.25 * heightCm - 5 * age + 5
    : 10 * weightKg + 6.25 * heightCm - 5 * age - 161;
  const tdee = bmr * (ACTIVITY_MULTIPLIERS[activityLevel] || 1.2);

  let weeklyRate;
  if (pace === "auto") {
    if (goalWeightLb != null && goalDate) {
      const daysLeft = diffDays(goalDate, todayISO());
      const weeksLeft = Math.max(daysLeft / 7, 1);
      weeklyRate = Math.max((weightLb - goalWeightLb) / weeksLeft, 0);
    } else {
      weeklyRate = 1;
    }
  } else {
    weeklyRate = parseFloat(pace);
  }

  const dailyDeficit = (weeklyRate * 3500) / 7;
  const floor = sex === "male" ? 1500 : 1200;
  let targetCalories = Math.round(tdee - dailyDeficit);
  let clamped = false;
  if (targetCalories < floor) { targetCalories = floor; clamped = true; }

  const targetProtein = Math.round((weightLb * 0.8) / 5) * 5;

  const warnings = [];
  if (weeklyRate > 2) warnings.push("That pace is quite aggressive — most guidance tops out around 1–2 lb/week for sustainable fat loss.");
  if (clamped) warnings.push(`Calculated intake was below a safe general floor, so it's capped at ${floor} kcal/day. Consider a gentler pace or goal date.`);

  return { bmr: Math.round(bmr), tdee: Math.round(tdee), weeklyRate, targetCalories, targetProtein, warnings };
}

const DEFAULT_SETTINGS = {
  startWeight: null, goalWeight: null, goalDate: "2026-12-31", startDate: todayISO(),
  tapeSites: DEFAULT_TAPE_SITES, caliperSites: DEFAULT_CALIPER_SITES,
  waterGoalOz: 64, calorieGoal: null, proteinGoal: null,
  sex: null, age: null, heightIn: null, activityLevel: "sedentary", pace: "auto",
};

function storageGet(key) { try { const v = localStorage.getItem(key); return v == null ? null : JSON.parse(v); } catch (e) { return null; } }
function storageSet(key, value) { try { localStorage.setItem(key, JSON.stringify(value)); return true; } catch (e) { return false; } }

function emptyEntry(date, settings) {
  const calipers = {}; settings.caliperSites.forEach((s) => (calipers[s] = ""));
  const tape = {}; settings.tapeSites.forEach((s) => (tape[s] = ""));
  return { date, weight: "", bodyFat: "", muscleMass: "", muscleUnit: "%", water: "", calipers, tape, notes: "", waterOz: 0, calories: "", protein: "", restingHR: "" };
}

// Used by the quick-log Today card, which never touches the full entry form.
// Unlike emptyEntry (which uses "" so controlled form inputs stay happy),
// this uses null so unset fields are correctly treated as "no data" everywhere else.
function blankDayEntry(date, settings) {
  const calipers = {}; settings.caliperSites.forEach((s) => (calipers[s] = null));
  const tape = {}; settings.tapeSites.forEach((s) => (tape[s] = null));
  return { date, weight: null, bodyFat: null, muscleMass: null, muscleUnit: "%", water: null, calipers, tape, notes: "", waterOz: 0, calories: null, protein: null, restingHR: null };
}

function sanitizeEntry(e) {
  const numOrNull = (v) => (v === "" || v == null ? null : (typeof v === "number" ? v : parseFloat(v)));
  return {
    ...e,
    weight: e.weight === "" || e.weight == null ? null : (typeof e.weight === "number" ? e.weight : parseFloat(e.weight)),
    bodyFat: numOrNull(e.bodyFat),
    muscleMass: numOrNull(e.muscleMass),
    water: numOrNull(e.water),
    waterOz: e.waterOz === "" || e.waterOz == null ? 0 : numOrNull(e.waterOz) || 0,
    calories: numOrNull(e.calories),
    protein: numOrNull(e.protein),
    restingHR: numOrNull(e.restingHR),
    calipers: Object.fromEntries(Object.entries(e.calipers || {}).map(([k, v]) => [k, numOrNull(v)])),
    tape: Object.fromEntries(Object.entries(e.tape || {}).map(([k, v]) => [k, numOrNull(v)])),
  };
}

function Washi({ color = "clay", side = "left" }) { return <div className={`bct-washi bct-washi-${color} bct-washi-${side}`} />; }

function RangePills({ value, onChange }) {
  return (
    <div className="bct-range-pills">
      {RANGE_OPTIONS.map((o) => (
        <button key={o.key} className={`bct-chip ${value === o.key ? "active" : ""}`} onClick={() => onChange(o.key)}>{o.label}</button>
      ))}
    </div>
  );
}

const ICON_PATHS = {
  droplet: "M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z",
  flame: "M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z",
  egg: "M12 22c6.23-.05 7.87-5.57 7.5-10-.36-4.34-3.95-9.96-7.5-10-3.55.04-7.14 5.66-7.5 10-.37 4.43 1.27 9.95 7.5 10z",
};
function Icon({ name, size = 16 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d={ICON_PATHS[name]} />
    </svg>
  );
}

function LineCanvas({ datasets, labels, tooltipUnit, kind = "line", referenceValue, referenceColor }) {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    if (chartRef.current) chartRef.current.destroy();
    const finalDatasets = [...datasets];
    if (referenceValue != null) {
      finalDatasets.push({ type: "line", label: "Goal", data: labels.map(() => referenceValue), borderColor: referenceColor || COLORS.gold, borderDash: [6, 4], pointRadius: 0, borderWidth: 1.5 });
    }
    chartRef.current = new Chart(ref.current.getContext("2d"), {
      type: kind,
      data: { labels, datasets: finalDatasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: "index", intersect: false },
        plugins: {
          legend: { display: finalDatasets.some((d) => d.label && !d.hideLegend), labels: { font: { size: 11, family: "Karla" }, color: "#8A7A63", boxWidth: 10 } },
          tooltip: {
            backgroundColor: "#3B2E22", titleFont: { family: "Space Mono", size: 11 }, bodyFont: { family: "Karla", size: 12 },
            callbacks: { label: (ctx) => `${ctx.dataset.label || "value"}: ${ctx.parsed.y}${tooltipUnit || ""}`, title: (items) => fmtDateFull(items[0].label) },
          },
        },
        scales: {
          x: { grid: { color: COLORS.line, drawTicks: false }, ticks: { font: { size: 10.5, family: "Karla" }, color: "#8A7A63", callback: function (val) { return fmtDate(this.getLabelForValue(val)); } } },
          y: { grid: { color: COLORS.line, drawTicks: false }, ticks: { font: { size: 10.5, family: "Space Mono" }, color: "#8A7A63" } },
        },
      },
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [JSON.stringify(labels), JSON.stringify(datasets), referenceValue]);
  return <div className="bct-chart-wrap"><canvas ref={ref}></canvas></div>;
}

function Tracker({ icon, color, label, value, goal, unit, children }) {
  const pct = goal ? clamp(((value || 0) / goal) * 100, 0, 100) : null;
  return (
    <div className="bct-tracker">
      <div className={`bct-tracker-icon bct-swatch-${color}`}>{icon}</div>
      <div className="bct-tracker-body">
        <p className="bct-tracker-label">{label}</p>
        <p className="bct-tracker-value">{value != null ? value : "—"}{goal ? <span className="bct-tracker-goal"> / {goal} {unit}</span> : <span className="bct-tracker-goal"> {unit}</span>}</p>
        {pct != null && <div className="bct-tracker-bar"><div className={`bct-tracker-bar-fill bct-swatch-${color}`} style={{ width: `${pct}%` }} /></div>}
        {children}
      </div>
    </div>
  );
}

function Squiggle() {
  return (
    <div className="bct-squiggle" aria-hidden="true">
      <svg viewBox="0 0 300 12" preserveAspectRatio="none"><path d="M0,6 Q15,0 30,6 T60,6 T90,6 T120,6 T150,6 T180,6 T210,6 T240,6 T270,6 T300,6" /></svg>
    </div>
  );
}

function App() {
  const [loading, setLoading] = useState(true);
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);
  const [entries, setEntries] = useState([]);
  const [showOnboard, setShowOnboard] = useState(false);
  const [showForm, setShowForm] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [draft, setDraft] = useState(null);
  const [editingDate, setEditingDate] = useState(null);
  const [exploreKey, setExploreKey] = useState(null);
  const [showInstallNote, setShowInstallNote] = useState(true);
  const [logOpen, setLogOpen] = useState(true);
  const [logPage, setLogPage] = useState(1);
  const [weightRange, setWeightRange] = useState("all");
  const [compRange, setCompRange] = useState("all");
  const [exploreRange, setExploreRange] = useState("all");
  const [logRange, setLogRange] = useState("all");
  const [weighInsOnly, setWeighInsOnly] = useState(false);

  useEffect(() => {
    const s = { ...DEFAULT_SETTINGS, ...(storageGet("bct_settings") || {}) };
    const e = (storageGet("bct_entries") || []).map(sanitizeEntry);
    setSettings(s); setEntries(e); setLoading(false);
    if (!s.startWeight || !s.goalWeight) setShowOnboard(true);
    setShowInstallNote(!window.matchMedia("(display-mode: standalone)").matches && !window.navigator.standalone);
  }, []);

  function persistSettings(next) { setSettings(next); storageSet("bct_settings", next); }
  function persistEntries(next) { setEntries(next); storageSet("bct_entries", next); }

  const sorted = useMemo(() => [...entries].sort((a, b) => (a.date < b.date ? -1 : 1)), [entries]);
  const weighIns = useMemo(() => sorted.filter((e) => e.weight != null && e.weight !== ""), [sorted]);

  // Each chart/table gets its OWN range filter, independent of the others.
  // The progress ruler/pace strip intentionally stay unfiltered.
  const weightRangeWeighIns = useMemo(() => filterByRange(weighIns, weightRange), [weighIns, weightRange]);
  const compRangeSorted = useMemo(() => filterByRange(sorted, compRange), [sorted, compRange]);
  const logRangeSorted = useMemo(() => filterByRange(sorted, logRange), [sorted, logRange]);
  const logRows = useMemo(() => (weighInsOnly ? logRangeSorted.filter((e) => e.weight != null && e.weight !== "") : logRangeSorted), [logRangeSorted, weighInsOnly]);
  const logRowsDesc = useMemo(() => [...logRows].reverse(), [logRows]);
  const logTotalPages = Math.max(1, Math.ceil(logRowsDesc.length / LOG_PAGE_SIZE));
  const logCurrentPage = Math.min(logPage, logTotalPages);
  const logPagedRows = useMemo(() => logRowsDesc.slice((logCurrentPage - 1) * LOG_PAGE_SIZE, logCurrentPage * LOG_PAGE_SIZE), [logRowsDesc, logCurrentPage]);
  const today = todayISO();
  const todayEntry = useMemo(() => entries.find((e) => e.date === today) || null, [entries, today]);

  function bumpToday(field, delta) {
    const existing = entries.find((e) => e.date === today);
    const base = existing || blankDayEntry(today, settings);
    const current = parseFloat(base[field]) || 0;
    const next = { ...base, [field]: Math.max(0, current + delta) };
    persistEntries([...entries.filter((e) => e.date !== today), next]);
  }
  function setTodayField(field, value) {
    const existing = entries.find((e) => e.date === today);
    const base = existing || blankDayEntry(today, settings);
    const next = { ...base, [field]: value };
    persistEntries([...entries.filter((e) => e.date !== today), next]);
  }

  const stats = useMemo(() => {
    const startWeight = settings.startWeight, goalWeight = settings.goalWeight;
    const current = weighIns.length ? weighIns[weighIns.length - 1].weight : startWeight;
    if (!startWeight || !goalWeight || current == null) return null;
    const totalToLose = startWeight - goalWeight;
    const lost = startWeight - current;
    const pct = totalToLose > 0 ? clamp((lost / totalToLose) * 100, 0, 100) : 0;
    const daysLeft = diffDays(settings.goalDate, todayISO());
    let weeklyRate = null, projected = null, status = null;
    if (weighIns.length >= 2) {
      const first = weighIns[0], last = weighIns[weighIns.length - 1];
      const weeks = Math.max(diffDays(last.date, first.date) / 7, 0.5);
      weeklyRate = (first.weight - last.weight) / weeks;
      const weeksLeft = Math.max(daysLeft / 7, 0);
      projected = current - weeklyRate * weeksLeft;
      status = weeklyRate <= 0 ? "stalled" : projected <= goalWeight + 0.5 ? "on-pace" : "behind";
    }
    return { startWeight, goalWeight, current, lost, toGo: current - goalWeight, pct, daysLeft, weeklyRate, projected, status, weighInCount: weighIns.length };
  }, [sorted, weighIns, settings]);

  const exploreOptions = useMemo(() => [
    { key: "n:restingHR", label: "Resting heart rate", group: "Vitals", unit: "bpm" },
    { key: "n:water", label: "Water", group: "Nutrition", unit: "oz" },
    { key: "n:calories", label: "Calories", group: "Nutrition", unit: "kcal" },
    { key: "n:protein", label: "Protein", group: "Nutrition", unit: "g" },
    ...settings.tapeSites.map((s) => ({ key: `tape:${s}`, label: s, group: "Tape (in)", unit: "in" })),
    ...settings.caliperSites.map((s) => ({ key: `caliper:${s}`, label: s, group: "Calipers (mm)", unit: "mm" })),
  ], [settings]);

  useEffect(() => { setLogPage(1); }, [logRange, weighInsOnly]);

  useEffect(() => { if (!exploreKey && exploreOptions.length) setExploreKey(exploreOptions[0].key); }, [exploreOptions, exploreKey]);

  function openNewEntry() { setDraft(emptyEntry(todayISO(), settings)); setEditingDate(null); setShowForm(true); }
  function openEditEntry(entry) {
    const calipers = {}; settings.caliperSites.forEach((s) => (calipers[s] = entry.calipers?.[s] ?? ""));
    const tape = {}; settings.tapeSites.forEach((s) => (tape[s] = entry.tape?.[s] ?? ""));
    setDraft({ ...emptyEntry(entry.date, settings), ...entry, calipers, tape, muscleUnit: entry.muscleUnit || "%" });
    setEditingDate(entry.date); setShowForm(true);
  }

  function saveDraft() {
    if (!draft.date || draft.weight === "" || draft.weight == null) return;
    const num = (v) => (v === "" || v == null ? null : parseFloat(v));
    const clean = {
      ...draft, weight: parseFloat(draft.weight), bodyFat: num(draft.bodyFat), muscleMass: num(draft.muscleMass),
      water: num(draft.water), waterOz: num(draft.waterOz) || 0, calories: num(draft.calories), protein: num(draft.protein), restingHR: num(draft.restingHR),
      calipers: Object.fromEntries(Object.entries(draft.calipers).map(([k, v]) => [k, num(v)])),
      tape: Object.fromEntries(Object.entries(draft.tape).map(([k, v]) => [k, num(v)])),
    };
    const next = entries.filter((e) => e.date !== (editingDate || clean.date));
    next.push(clean);
    persistEntries(next);
    setShowForm(false); setDraft(null); setEditingDate(null);
  }
  function deleteEntry(date) { persistEntries(entries.filter((e) => e.date !== date)); }
  function completeOnboard(startWeight, goalWeight, goalDate) {
    persistSettings({ ...settings, startWeight, goalWeight, goalDate, startDate: todayISO() });
    setShowOnboard(false);
  }

  const exploreSeries = useMemo(() => {
    if (!exploreKey) return [];
    const [type, ...rest] = exploreKey.split(":"); const site = rest.join(":");
    return filterByRange(sorted, exploreRange).map((e) => {
      let value = null;
      if (type === "n") value = site === "water" ? e.waterOz : site === "calories" ? e.calories : site === "protein" ? e.protein : e.restingHR;
      else if (type === "tape") value = e.tape?.[site];
      else if (type === "caliper") value = e.calipers?.[site];
      return { date: e.date, value };
    }).filter((d) => d.value != null);
  }, [sorted, exploreRange, exploreKey]);

  if (loading) return <div className="bct-app" style={{ minHeight: 240, display: "flex", alignItems: "center", justifyContent: "center" }}><p className="bct-muted">Loading your log…</p></div>;

  const waterOz = todayEntry?.waterOz || 0;

  return (
    <div className="bct-app">
      <div className="bct-wrap">
        {showInstallNote && (
          <div className="bct-install-note">
            <span>📌</span>
            <div>
              <strong>Save this page to your home screen:</strong> if this page is served from a real web address, tap Share → Add to Home Screen in Safari (or the menu in Chrome). Local files can no longer be added directly on current iOS — see below if that's the case.
              <div><button className="bct-icon-btn small" style={{ marginTop: 8 }} onClick={() => setShowInstallNote(false)}>Got it</button></div>
            </div>
          </div>
        )}

        <header className="bct-header">
          <div>
            <p className="bct-eyebrow">✎ a page for the journey</p>
            <h1 className="bct-title">The Body Log</h1>
          </div>
          <div className="bct-header-actions">
            <button className="bct-icon-btn" onClick={() => setShowSettings(true)}>⚙</button>
            <button className="bct-btn-primary" onClick={openNewEntry}>+ New entry</button>
          </div>
        </header>

        {stats ? (
          <div className="bct-card">
            <Washi color="clay" />
            <div className="bct-ruler-stats">
              <div><p className="bct-stat-num">{Math.abs(stats.lost).toFixed(1)}</p><p className="bct-stat-label">{stats.startWeight >= stats.goalWeight ? "lb lost" : "lb gained"}</p></div>
              <div><p className="bct-stat-num">{Math.abs(stats.toGo).toFixed(1)}</p><p className="bct-stat-label">lb to go</p></div>
              <div><p className="bct-stat-num">{stats.pct.toFixed(0)}%</p><p className="bct-stat-label">of goal</p></div>
              <div><p className="bct-stat-num">{stats.current.toFixed(1)}</p><p className="bct-stat-label">current lb</p></div>
            </div>
            <div className="bct-tape-track">
              <div className="bct-tape-fill" style={{ width: `${stats.pct}%` }} />
              <div className="bct-pin" style={{ left: `${stats.pct}%` }} />
              <div className="bct-pin-label" style={{ left: `${stats.pct}%` }}>{stats.current.toFixed(1)}</div>
            </div>
            <div className="bct-tape-ends"><span>{stats.startWeight} lb start</span><span>{stats.goalWeight} lb goal</span></div>
          </div>
        ) : (
          <div className="bct-card bct-empty">
            <Washi color="clay" />
            <p>Set a starting weight and goal to see your progress page.</p>
            <button className="bct-btn-primary" onClick={() => setShowOnboard(true)}>Set goal</button>
          </div>
        )}

        {stats && stats.weighInCount >= 2 && (
          <div className={`bct-pace bct-pace-${stats.status === "on-pace" ? "good" : "warn"}`}>
            <span>{stats.status === "on-pace" ? "On pace for your goal" : stats.status === "behind" ? "Behind pace to hit your goal" : "Not currently trending down"}</span>
            <span className="bct-pace-detail">
              {stats.weeklyRate != null ? `${Math.abs(stats.weeklyRate).toFixed(2)} lb/wk average` : ""}
              {stats.projected != null ? ` · projected ${stats.projected.toFixed(1)} lb by goal date` : ""}
              {stats.daysLeft >= 0 ? ` · ${stats.daysLeft} days left` : " · goal date passed"}
            </span>
          </div>
        )}

        <div className="bct-card">
          <Washi color="dustyblue" />
          <div className="bct-card-title-row">
            <h2 className="bct-card-title">Today's page</h2>
            <span className="bct-handwritten">{fmtDateFull(today)}</span>
          </div>
          <div className="bct-today-grid">
            <Tracker icon={<Icon name="droplet" />} color="dustyblue" label="Water" value={waterOz} goal={settings.waterGoalOz} unit="oz">
              <div className="bct-quickadd">
                <button className="bct-chip" onClick={() => bumpToday("waterOz", 8)}>+8oz</button>
                <button className="bct-chip" onClick={() => bumpToday("waterOz", 16)}>+16oz</button>
                <button className="bct-chip" onClick={() => bumpToday("waterOz", 32)}>+32oz</button>
                {waterOz > 0 && <button className="bct-chip subtle" onClick={() => setTodayField("waterOz", 0)}>reset</button>}
              </div>
            </Tracker>
            <Tracker icon={<Icon name="flame" />} color="gold" label="Calories" value={todayEntry?.calories ?? null} goal={settings.calorieGoal} unit="kcal">
              <input type="number" inputMode="numeric" className="bct-inline-input" placeholder="log kcal" value={todayEntry?.calories ?? ""} onChange={(e) => setTodayField("calories", e.target.value === "" ? null : parseFloat(e.target.value))} />
            </Tracker>
            <Tracker icon={<Icon name="egg" />} color="rose" label="Protein" value={todayEntry?.protein ?? null} goal={settings.proteinGoal} unit="g">
              <input type="number" inputMode="numeric" className="bct-inline-input" placeholder="log grams" value={todayEntry?.protein ?? ""} onChange={(e) => setTodayField("protein", e.target.value === "" ? null : parseFloat(e.target.value))} />
            </Tracker>
          </div>
        </div>

        <Squiggle />

        <div className="bct-grid-2">
          <div className="bct-card">
            <Washi color="clay" side="right" />
            <div className="bct-card-title-row">
              <h2 className="bct-card-title">Weight</h2>
              <RangePills value={weightRange} onChange={setWeightRange} />
            </div>
            {weightRangeWeighIns.length ? (
              <LineCanvas labels={weightRangeWeighIns.map((e) => e.date)} tooltipUnit=" lb" referenceValue={settings.goalWeight} referenceColor={COLORS.gold}
                datasets={[{ label: "Weight", data: weightRangeWeighIns.map((e) => e.weight), borderColor: COLORS.clay, backgroundColor: COLORS.clay, tension: .3, pointRadius: 3, borderWidth: 2.5 }]} />
            ) : <div className="bct-empty-chart">Log a weigh-in to see your trend</div>}
          </div>
          <div className="bct-card">
            <Washi color="moss" side="right" />
            <div className="bct-card-title-row">
              <h2 className="bct-card-title">Body fat % &amp; muscle %</h2>
              <RangePills value={compRange} onChange={setCompRange} />
            </div>
            {compRangeSorted.some((e) => e.bodyFat != null || (e.muscleMass != null && e.muscleUnit === "%")) ? (
              <LineCanvas labels={compRangeSorted.map((e) => e.date)} tooltipUnit="%"
                datasets={[
                  { label: "Body fat %", data: compRangeSorted.map((e) => e.bodyFat), borderColor: COLORS.rose, backgroundColor: COLORS.rose, tension: .3, pointRadius: 3, borderWidth: 2.5, spanGaps: true },
                  { label: "Muscle %", data: compRangeSorted.map((e) => (e.muscleUnit === "%" ? e.muscleMass : null)), borderColor: COLORS.moss, backgroundColor: COLORS.moss, tension: .3, pointRadius: 3, borderWidth: 2.5, spanGaps: true },
                ]} />
            ) : <div className="bct-empty-chart">Add body fat % or muscle % from your scale</div>}
          </div>
        </div>

        <div className="bct-card">
          <Washi color="gold" />
          <div className="bct-card-title-row">
            <h2 className="bct-card-title">Explore a metric</h2>
            {exploreOptions.length > 0 && (
              <select className="bct-select" value={exploreKey || ""} onChange={(e) => setExploreKey(e.target.value)}>
                {["Vitals", "Nutrition", "Tape (in)", "Calipers (mm)"].map((g) => (
                  <optgroup label={g} key={g}>{exploreOptions.filter((o) => o.group === g).map((o) => <option key={o.key} value={o.key}>{o.label}</option>)}</optgroup>
                ))}
              </select>
            )}
          </div>
          <div className="bct-filter-row"><RangePills value={exploreRange} onChange={setExploreRange} /></div>
          {exploreSeries.length ? (
            <LineCanvas
              labels={exploreSeries.map((d) => d.date)}
              tooltipUnit={exploreOptions.find((o) => o.key === exploreKey)?.unit ? " " + exploreOptions.find((o) => o.key === exploreKey).unit : ""}
              kind={exploreKey === "n:water" ? "bar" : "line"}
              referenceValue={exploreKey === "n:water" ? settings.waterGoalOz : null}
              referenceColor={COLORS.gold}
              datasets={[{ label: "Value", hideLegend: true, data: exploreSeries.map((d) => d.value), borderColor: exploreKey === "n:water" ? COLORS.dustyblue : COLORS.gold, backgroundColor: exploreKey === "n:water" ? COLORS.dustyblue : COLORS.gold, tension: .3, pointRadius: 3, borderWidth: 2.5 }]}
            />
          ) : <div className="bct-empty-chart">No readings yet for this metric</div>}
        </div>

        <div className="bct-card">
          <Washi color="clay" />
          <button className="bct-collapse-trigger" onClick={() => setLogOpen((v) => !v)} aria-expanded={logOpen}>
            <h2 className="bct-card-title">Log {logRows.length > 0 && <span className="bct-log-count">· {logRows.length} {logRows.length === 1 ? "entry" : "entries"}</span>}</h2>
            <span className={`bct-chevron ${logOpen ? "open" : ""}`}>⌄</span>
          </button>
          {logOpen && (
            <>
              {sorted.length > 0 && (
                <div className="bct-filter-row">
                  <RangePills value={logRange} onChange={setLogRange} />
                  <button className={`bct-chip ${weighInsOnly ? "active" : ""}`} onClick={() => setWeighInsOnly((v) => !v)}>
                    {weighInsOnly ? "✓ " : ""}Weigh-ins only
                  </button>
                </div>
              )}
              {logRows.length === 0 ? <div className="bct-empty-chart">{sorted.length === 0 ? "Your entries will show up here" : "No entries match this filter"}</div> : (
                <>
                  <div className="bct-table-wrap">
                    <table className="bct-table">
                      <thead><tr><th>Date</th><th>Weight</th><th>Fat %</th><th>Muscle</th><th>RHR</th><th>Water</th><th>Cal</th><th>Protein</th><th></th></tr></thead>
                      <tbody>
                        {logPagedRows.map((e) => (
                          <tr key={e.date}>
                            <td>{fmtDateFull(e.date)}</td>
                            <td className="bct-mono">{e.weight != null ? `${e.weight} lb` : "—"}</td>
                            <td className="bct-mono">{e.bodyFat != null ? `${e.bodyFat}%` : "—"}</td>
                            <td className="bct-mono">{e.muscleMass != null ? `${e.muscleMass}${e.muscleUnit === "%" ? "%" : " lb"}` : "—"}</td>
                            <td className="bct-mono">{e.restingHR != null ? `${e.restingHR}bpm` : "—"}</td>
                            <td className="bct-mono">{e.waterOz ? `${e.waterOz}oz` : "—"}</td>
                            <td className="bct-mono">{e.calories != null ? e.calories : "—"}</td>
                            <td className="bct-mono">{e.protein != null ? `${e.protein}g` : "—"}</td>
                            <td className="bct-row-actions">
                              <button className="bct-icon-btn small" onClick={() => openEditEntry(e)}>✎</button>
                              <button className="bct-icon-btn small" onClick={() => deleteEntry(e.date)}>✕</button>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                  {logTotalPages > 1 && (
                    <div className="bct-pagination">
                      <button className="bct-icon-btn small" onClick={() => setLogPage((p) => Math.max(1, p - 1))} disabled={logCurrentPage === 1} aria-label="Previous page">‹</button>
                      <span className="bct-pagination-label">Page {logCurrentPage} of {logTotalPages}</span>
                      <button className="bct-icon-btn small" onClick={() => setLogPage((p) => Math.min(logTotalPages, p + 1))} disabled={logCurrentPage === logTotalPages} aria-label="Next page">›</button>
                    </div>
                  )}
                </>
              )}
            </>
          )}
        </div>
      </div>

      {showOnboard && <OnboardModal defaultGoalDate={settings.goalDate} allowClose={!!settings.startWeight} onClose={() => (settings.startWeight ? setShowOnboard(false) : null)} onSave={completeOnboard} />}

      {showForm && draft && (
        <EntryFormModal
          draft={draft} setDraft={setDraft} settings={settings} isEdit={!!editingDate}
          onClose={() => { setShowForm(false); setDraft(null); setEditingDate(null); }}
          onSave={saveDraft}
          onAddSite={(kind, name) => {
            const key = kind === "tape" ? "tapeSites" : "caliperSites";
            if (settings[key].includes(name)) return;
            const nextSettings = { ...settings, [key]: [...settings[key], name] };
            persistSettings(nextSettings);
            setDraft((d) => ({ ...d, [kind]: { ...d[kind], [name]: "" } }));
          }}
        />
      )}

      {showSettings && (
        <SettingsModal
          settings={settings} entries={entries} currentWeight={stats ? stats.current : settings.startWeight}
          onClose={() => setShowSettings(false)}
          onSave={(next) => { persistSettings(next); setShowSettings(false); }}
          onImport={(data) => { if (data.settings) persistSettings({ ...DEFAULT_SETTINGS, ...data.settings }); if (data.entries) persistEntries(data.entries); setShowSettings(false); }}
        />
      )}
    </div>
  );
}

function OnboardModal({ onSave, onClose, defaultGoalDate, allowClose }) {
  const [startWeight, setStartWeight] = useState("");
  const [goalWeight, setGoalWeight] = useState("");
  const [goalDate, setGoalDate] = useState(defaultGoalDate);
  const canSave = startWeight !== "" && goalWeight !== "" && goalDate;
  function suggestGoal() {
    if (startWeight && !goalWeight) {
      const sw = parseFloat(startWeight);
      if (!isNaN(sw)) setGoalWeight((sw - 30).toFixed(0));
    }
  }
  return (
    <div className="bct-overlay">
      <div className="bct-modal">
        <div className="bct-modal-head"><h3>Set your starting point</h3>{allowClose && <button className="bct-icon-btn small" onClick={onClose}>✕</button>}</div>
        <p className="bct-muted small">This sets the ends of your progress page. Change it anytime in settings.</p>
        <label className="bct-field"><span>Starting weight (lb)</span><input type="number" inputMode="decimal" value={startWeight} onChange={(e) => setStartWeight(e.target.value)} onBlur={suggestGoal} placeholder="e.g. 210" /></label>
        <label className="bct-field"><span>Goal weight (lb)</span><input type="number" inputMode="decimal" value={goalWeight} onChange={(e) => setGoalWeight(e.target.value)} placeholder="e.g. 180" /></label>
        <label className="bct-field"><span>Goal date</span><input type="date" value={goalDate} onChange={(e) => setGoalDate(e.target.value)} /></label>
        <button className="bct-btn-primary full" disabled={!canSave} onClick={() => onSave(parseFloat(startWeight), parseFloat(goalWeight), goalDate)}>Save goal</button>
      </div>
    </div>
  );
}

function EntryFormModal({ draft, setDraft, settings, isEdit, onClose, onSave, onAddSite }) {
  const [newTapeSite, setNewTapeSite] = useState("");
  const [newCaliperSite, setNewCaliperSite] = useState("");
  const set = (field, value) => setDraft((d) => ({ ...d, [field]: value }));
  const setNested = (group, key, value) => setDraft((d) => ({ ...d, [group]: { ...d[group], [key]: value } }));
  return (
    <div className="bct-overlay">
      <div className="bct-modal wide">
        <div className="bct-modal-head"><h3>{isEdit ? "Edit entry" : "New entry"}</h3><button className="bct-icon-btn small" onClick={onClose}>✕</button></div>
        <div className="bct-form-grid">
          <label className="bct-field"><span>Date</span><input type="date" value={draft.date} onChange={(e) => set("date", e.target.value)} /></label>
          <label className="bct-field"><span>Weight (lb)</span><input type="number" inputMode="decimal" value={draft.weight} onChange={(e) => set("weight", e.target.value)} placeholder="Smart scale" /></label>
          <label className="bct-field"><span>Body fat %</span><input type="number" inputMode="decimal" value={draft.bodyFat} onChange={(e) => set("bodyFat", e.target.value)} placeholder="Smart scale" /></label>
          <label className="bct-field"><span>Muscle mass</span>
            <div className="bct-input-with-toggle">
              <input type="number" inputMode="decimal" value={draft.muscleMass} onChange={(e) => set("muscleMass", e.target.value)} />
              <select value={draft.muscleUnit} onChange={(e) => set("muscleUnit", e.target.value)}><option value="%">%</option><option value="lb">lb</option></select>
            </div>
          </label>
          <label className="bct-field"><span>Resting heart rate (bpm)</span><input type="number" inputMode="decimal" value={draft.restingHR} onChange={(e) => set("restingHR", e.target.value)} placeholder="Morning pulse" /></label>
          <label className="bct-field"><span>Water total (oz)</span><input type="number" inputMode="decimal" value={draft.waterOz} onChange={(e) => set("waterOz", e.target.value)} /></label>
          <label className="bct-field"><span>Calories</span><input type="number" inputMode="decimal" value={draft.calories} onChange={(e) => set("calories", e.target.value)} /></label>
          <label className="bct-field"><span>Protein (g)</span><input type="number" inputMode="decimal" value={draft.protein} onChange={(e) => set("protein", e.target.value)} /></label>
        </div>
        <div className="bct-section">
          <p className="bct-section-title">Calipers · mm</p>
          <div className="bct-form-grid">
            {settings.caliperSites.map((site) => (
              <label className="bct-field" key={site}><span>{site}</span><input type="number" inputMode="decimal" value={draft.calipers[site] ?? ""} onChange={(e) => setNested("calipers", site, e.target.value)} /></label>
            ))}
          </div>
          <div className="bct-add-site">
            <input placeholder="Add caliper site" value={newCaliperSite} onChange={(e) => setNewCaliperSite(e.target.value)} />
            <button className="bct-icon-btn small" onClick={() => { if (newCaliperSite.trim()) { onAddSite("calipers", newCaliperSite.trim()); setNewCaliperSite(""); } }}>+</button>
          </div>
        </div>
        <div className="bct-section">
          <p className="bct-section-title">Tape measure · in</p>
          <div className="bct-form-grid">
            {settings.tapeSites.map((site) => (
              <label className="bct-field" key={site}><span>{site}</span><input type="number" inputMode="decimal" value={draft.tape[site] ?? ""} onChange={(e) => setNested("tape", site, e.target.value)} /></label>
            ))}
          </div>
          <div className="bct-add-site">
            <input placeholder="Add tape site" value={newTapeSite} onChange={(e) => setNewTapeSite(e.target.value)} />
            <button className="bct-icon-btn small" onClick={() => { if (newTapeSite.trim()) { onAddSite("tape", newTapeSite.trim()); setNewTapeSite(""); } }}>+</button>
          </div>
        </div>
        <label className="bct-field"><span>Notes</span><textarea rows={2} value={draft.notes} onChange={(e) => set("notes", e.target.value)} placeholder="Optional" /></label>
        <button className="bct-btn-primary full" disabled={draft.weight === ""} onClick={onSave}>Save entry</button>
      </div>
    </div>
  );
}

function SettingsModal({ settings, entries, currentWeight, onClose, onSave, onImport }) {
  const [local, setLocal] = useState(settings);
  const [showBackup, setShowBackup] = useState(false);
  const [showCalc, setShowCalc] = useState(false);
  const [importText, setImportText] = useState("");
  const [importError, setImportError] = useState("");
  const [copyState, setCopyState] = useState("idle");
  const set = (k, v) => setLocal((s) => ({ ...s, [k]: v }));
  const removeSite = (kind, site) => setLocal((s) => ({ ...s, [kind]: s[kind].filter((x) => x !== site) }));
  const exportJson = JSON.stringify({ settings, entries }, null, 2);

  const calcResult = useMemo(() => {
    if (!local.sex || !local.age || !local.heightIn || !currentWeight) return null;
    return computeMacros({
      sex: local.sex, age: parseFloat(local.age), heightIn: parseFloat(local.heightIn), weightLb: currentWeight,
      activityLevel: local.activityLevel || "sedentary", goalWeightLb: local.goalWeight, goalDate: local.goalDate, pace: local.pace || "auto",
    });
  }, [local.sex, local.age, local.heightIn, local.activityLevel, local.pace, local.goalWeight, local.goalDate, currentWeight]);

  return (
    <div className="bct-overlay">
      <div className="bct-modal">
        <div className="bct-modal-head"><h3>Settings</h3><button className="bct-icon-btn small" onClick={onClose}>✕</button></div>
        <label className="bct-field"><span>Starting weight (lb)</span><input type="number" value={local.startWeight ?? ""} onChange={(e) => set("startWeight", parseFloat(e.target.value))} /></label>
        <label className="bct-field"><span>Goal weight (lb)</span><input type="number" value={local.goalWeight ?? ""} onChange={(e) => set("goalWeight", parseFloat(e.target.value))} /></label>
        <label className="bct-field"><span>Goal date</span><input type="date" value={local.goalDate} onChange={(e) => set("goalDate", e.target.value)} /></label>

        <div className="bct-section">
          <p className="bct-section-title">Nutrition &amp; water goals</p>
          <div className="bct-form-grid">
            <label className="bct-field"><span>Water goal (oz)</span><input type="number" value={local.waterGoalOz ?? ""} onChange={(e) => set("waterGoalOz", parseFloat(e.target.value))} /></label>
            <label className="bct-field"><span>Calorie goal</span><input type="number" value={local.calorieGoal ?? ""} onChange={(e) => set("calorieGoal", e.target.value === "" ? null : parseFloat(e.target.value))} /></label>
          </div>
          <label className="bct-field"><span>Protein goal (g)</span><input type="number" value={local.proteinGoal ?? ""} onChange={(e) => set("proteinGoal", e.target.value === "" ? null : parseFloat(e.target.value))} /></label>

          <button className="bct-btn-secondary" onClick={() => setShowCalc((v) => !v)}>{showCalc ? "Hide" : "Show"} calculator</button>
          {showCalc && (
            <div className="bct-calc">
              <p className="bct-muted small">Estimates from the Mifflin–St Jeor formula, using your most recent weigh-in. A starting point, not medical advice — check with a doctor or dietitian for anything personalized.</p>
              <div className="bct-form-grid">
                <label className="bct-field"><span>Sex (for formula)</span>
                  <div className="bct-toggle-group">
                    <button type="button" className={`bct-chip ${local.sex === "female" ? "active" : ""}`} onClick={() => set("sex", "female")}>Female</button>
                    <button type="button" className={`bct-chip ${local.sex === "male" ? "active" : ""}`} onClick={() => set("sex", "male")}>Male</button>
                  </div>
                </label>
                <label className="bct-field"><span>Age</span><input type="number" value={local.age ?? ""} onChange={(e) => set("age", e.target.value === "" ? null : parseFloat(e.target.value))} /></label>
              </div>
              <div className="bct-form-grid">
                <label className="bct-field"><span>Height (ft)</span>
                  <input type="number" value={local.heightIn ? Math.floor(local.heightIn / 12) : ""} onChange={(e) => { const ft = parseFloat(e.target.value) || 0; const inches = local.heightIn ? local.heightIn % 12 : 0; set("heightIn", ft * 12 + inches); }} />
                </label>
                <label className="bct-field"><span>Height (in)</span>
                  <input type="number" value={local.heightIn ? local.heightIn % 12 : ""} onChange={(e) => { const inches = parseFloat(e.target.value) || 0; const ft = local.heightIn ? Math.floor(local.heightIn / 12) : 0; set("heightIn", ft * 12 + inches); }} />
                </label>
              </div>
              <label className="bct-field"><span>Activity level</span>
                <select value={local.activityLevel || "sedentary"} onChange={(e) => set("activityLevel", e.target.value)}>
                  <option value="sedentary">Sedentary — little or no exercise</option>
                  <option value="light">Light — exercise 1–3 days/wk</option>
                  <option value="moderate">Moderate — exercise 3–5 days/wk</option>
                  <option value="active">Active — exercise 6–7 days/wk</option>
                  <option value="veryActive">Very active — physical job or 2x/day training</option>
                </select>
              </label>
              <label className="bct-field"><span>Target pace</span>
                <select value={local.pace || "auto"} onChange={(e) => set("pace", e.target.value)}>
                  <option value="auto">Match my goal date</option>
                  <option value="0.5">0.5 lb/week</option>
                  <option value="1">1 lb/week</option>
                  <option value="1.5">1.5 lb/week</option>
                  <option value="2">2 lb/week</option>
                </select>
              </label>

              {calcResult ? (
                <div className="bct-calc-result">
                  <div className="bct-calc-row"><span>Maintenance (TDEE)</span><strong>{calcResult.tdee} kcal</strong></div>
                  <div className="bct-calc-row"><span>Pace</span><strong>{calcResult.weeklyRate.toFixed(2)} lb/wk</strong></div>
                  <div className="bct-calc-row"><span>Suggested calories</span><strong>{calcResult.targetCalories} kcal</strong></div>
                  <div className="bct-calc-row"><span>Suggested protein</span><strong>{calcResult.targetProtein} g</strong></div>
                  {calcResult.warnings.map((w, i) => <p key={i} className="bct-calc-warning">{w}</p>)}
                  <button type="button" className="bct-btn-primary" onClick={() => { set("calorieGoal", calcResult.targetCalories); set("proteinGoal", calcResult.targetProtein); }}>Use these numbers</button>
                </div>
              ) : (
                <p className="bct-muted small">Fill in sex, age, and height above{!currentWeight ? " (and log a weigh-in)" : ""} to see suggested numbers.</p>
              )}
            </div>
          )}
        </div>

        <div className="bct-section">
          <p className="bct-section-title">Caliper sites</p>
          <div className="bct-tag-list">{local.caliperSites.map((s) => <span key={s} className="bct-tag">{s} <button onClick={() => removeSite("caliperSites", s)}>✕</button></span>)}</div>
        </div>
        <div className="bct-section">
          <p className="bct-section-title">Tape sites</p>
          <div className="bct-tag-list">{local.tapeSites.map((s) => <span key={s} className="bct-tag">{s} <button onClick={() => removeSite("tapeSites", s)}>✕</button></span>)}</div>
        </div>

        <button className="bct-btn-primary full" onClick={() => onSave(local)}>Save settings</button>

        <div className="bct-section bct-backup">
          <p className="bct-section-title">Backup &amp; transfer</p>
          <p className="bct-muted small">Move your data to another device, back it up, or restore it later.</p>
          <button className="bct-btn-secondary" onClick={() => setShowBackup((v) => !v)}>{showBackup ? "Hide" : "Show"} backup tools</button>
          {showBackup && (
            <div style={{ marginTop: 10, display: "flex", flexDirection: "column", gap: 14 }}>
              <ol className="bct-backup-steps">
                <li>On this device: tap <strong>Copy</strong> below.</li>
                <li>Open this app on the other device (or paste it somewhere safe, like a notes app, for safekeeping).</li>
                <li>Tap into the <strong>Paste your backup here</strong> box below and paste, then tap <strong>Import</strong>.</li>
              </ol>
              <div>
                <div className="bct-backup-row">
                  <p className="bct-muted small" style={{ margin: 0 }}>Your data (don't edit this — just copy the whole thing):</p>
                  <button className="bct-btn-secondary small" onClick={async () => {
                    try { await navigator.clipboard.writeText(exportJson); setCopyState("copied"); }
                    catch (err) { setCopyState("failed"); }
                    setTimeout(() => setCopyState("idle"), 2000);
                  }}>{copyState === "copied" ? "Copied ✓" : copyState === "failed" ? "Tap box, then Cmd/Ctrl+C" : "Copy"}</button>
                </div>
                <textarea readOnly rows={4} value={exportJson} onClick={(e) => e.target.select()} />
              </div>
              <div>
                <p className="bct-muted small" style={{ marginBottom: 4 }}>Paste your backup here:</p>
                <textarea rows={4} value={importText} placeholder="Paste the text you copied from the box above — it'll start with { &quot;settings&quot;: ..." onChange={(e) => { setImportText(e.target.value); setImportError(""); }} />
                <button className="bct-btn-secondary" style={{ marginTop: 6 }} onClick={() => {
                  let data;
                  try { data = JSON.parse(importText); }
                  catch (err) { setImportError("That doesn't look like valid backup text — make sure you copied the whole box, with nothing added or missing."); return; }
                  if (!data || typeof data !== "object" || (!data.settings && !data.entries)) { setImportError("That's valid text, but not a Body Log backup — it's missing the data this app expects."); return; }
                  onImport(data);
                }}>Import</button>
                {importError && <p className="bct-error">{importError}</p>}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
